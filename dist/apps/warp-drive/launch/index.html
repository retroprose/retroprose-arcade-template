	<body>
		<div id="user" hidden>
			<h1>Warp Drive</h1>
			<label for="name">Name: </label><input id="name" type="text" /><button onclick="join();">Join</button><br />
			<p id="message"></p>
		</div>
		<div id="admin" hidden>
			<h1>Admin Panel</h1>
			<h3>Launch Game Offline</h3>
			<button onclick="launchOffline();">Launch Offline</button><br />
			<h3>Join Link</h3>
			<button onclick="copyLink();">Copy</button><span id="join-link"></span><br />
			<h3>Launch Game</h3>
			<button onclick="launch();">Launch</button><br />
			<h3>Credentials</h3>
			<label for="domain">Domain: </label><input id="domain" type="text" value="" /><br />
			<label for="password">Password: </label><input id="password" type="password" value="" /><br />
			<h3>Configure</h3>
			<button onclick="refreshConfig();">Refresh</button><button onclick="updateConfig();">Update</button><br />
			
			<!-- <textarea id="settings"></textarea><br /> -->
			
			<label for="players">Players: </label>
			<select name="players" id="settings_players">
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="7">7</option>
				<option value="8">8</option>
				<option value="9">9</option>
				<option value="10">10</option>
				<option value="11">11</option>
				<option value="12">12</option>
				<option value="13">13</option>
				<option value="14">14</option>
				<option value="15">15</option>
				<option value="16" selected>16</option>
			</select>

			<label for="delay">Input Delay: </label>
			<select name="delay" id="settings_delay">
				<option value="1">1</option>
				<option value="2">2</option>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6" selected>6</option>
				<option value="7">7</option>
				<option value="8">8</option>
				<option value="9">9</option>
				<option value="10">10</option>
			</select>
			
			<h3>Roster</h3>
			<button onclick="refreshRoster();">Refresh</button><br />
			<table>
				<thead>
					<tr>
						<th scope="col">Player</th>
						<th scope="col">Connected</th>
						<th scope="col">Kick</th>
					</tr>
				</thead>
				<tbody id="roster">
				</tbody>
			</table>
		</div>
		
		<!-- core scripts -->
		<script src="/js/pixi.min.js"></script>
		<script src="/js/network.js"></script>
		<script src="/js/networkvisualizer.js"></script>
		<script src="./scripts/cpp-module.js"></script>
		<script src="./scripts/main.js"></script>
		
		<script>
		
			function default_values() {
				const password = document.getElementById("password");
				const domain = document.getElementById("domain");
				const name = document.getElementById("name");
				//const config = document.getElementById("settings");
				//domain.value = 'http://localhost/';
				//password.value = 'password';
				
				domain.value = 'https://retroprose-arcade-relay-server-latest.onrender.com/';
				password.value = 'Megaman11!';
				
				name.value = 'Guest' + Math.floor(Math.random()*9999);
				/*configData = {
					slot: 16,
					input: 1,
					buffer: 32,
					user: {
					   	fastForward: 0,
						inputDelay: 6
					}
				};
				config.value = JSON.stringify(configData, null, 4);*/
			}

			Module.onRuntimeInitialized = function() {
				window.tempStyle = document.getElementById("style");
				document.head.remove(window.tempStyle);
				window.messageNum = 0;
				default_values();
				const params = new URLSearchParams(window.location.search);
				if (params.size == 0) {
					// just run in single player mode
					document.body.appendChild(window.tempStyle);
					window.gameObject = new Main();
					window.gameObject.init({
						slot: 1,
						input: 1
					});
				} else {
					const user = document.getElementById("user");
					user.hidden = false;

					const domain = document.getElementById("domain");
					const password = document.getElementById("password");
					if (params.has('p')) { password.value = params.get('p'); }
					if (params.has('u')) { domain.value = params.get('u'); }
					//password.value = (params.has('p')) ? params.get('p') : '';
					//domain.value = (params.has('u')) ? decodeURI(params.get('u')) : '';				
					
					if (params.has('m')) {
						// admin mode
						const admin = document.getElementById("admin");
						admin.hidden = false;
						if (password.value != '' && domain.value != '') {
							refreshConfig();
						}
					} else {
						if (domain.value.trim() != '') {
							join();
						}
					}
				}
			};

			function copyLink() {
				const joinLink = document.getElementById("join-link");
				navigator.clipboard.writeText(joinLink.innerHTML);
			}

			async function updateConfig() {
				try {
					const input = getInput();
					
					const configData = {
						pass: input.password,
						slot: parseInt(input.players),
						input: 1,
						buffer: 32,
						user: {
							fastForward: 0,
							inputDelay: parseInt(input.delay)
						}
					};
					const configJsonStr = JSON.stringify(configData, null, 4);

					const response = await fetch(`${domain.value}config`, {
						headers: {
							//'Authorization': 'Basic ' + btoa('admin:' + input.password),
							'Accept': 'application/json',
							'Content-Type': 'application/json'
						},
						method: 'PUT',
						body: configJsonStr
					});	
					const json = await response.json();
					if (json.code < 1) {
						displayMessage('failed to get config');
						return;
					}
					// set join link here
					getLink();
					displayMessage('config updated.');
				} catch (e) {
					displayMessage(e.message);
				}
			}

			async function refreshConfig() {
				try {
					const input = getInput();
					const response = await fetch(`${input.domain}data`, {
						headers: { 'Accept': 'application/json' },
						method: 'GET'
					});
					const json = await response.json();
					if (json.hasOwnProperty('code')) {
						displayMessage('failed to get config');
						return;
					}
					const settings_players = document.getElementById("settings_players");
					const settings_delay = document.getElementById("settings_delay");
					settings_players.value = json.slot;
					settings_delay.value = json.user.inputDelay;
					// set join link here
					getLink();
					displayMessage('config refreshed');
				} catch (e) {
					displayMessage(e.message);
				}
			}

			async function refreshRoster() {
				try {
					const input = getInput();
					const response = await fetch(`${domain.value}roster`, {
						headers: { 'Accept': 'application/json' },
						method: 'GET'
					});
					const json = await response.json();
					if (json.hasOwnProperty('code')) {
						displayMessage('failed to get roster');
						return;
					}
					console.log(json);
					const roster = document.getElementById("roster");
					let list = [];
					let index = 0;
					for (const entry of json) {
						if (entry.user == null) {
							list.push(`<tr><th scope="row">__UNOCCUPIED__</th><td>false</td><td><button disabled>Kick</button></td></tr>`);
						} else {
							list.push(`<tr><th scope="row">${entry.user.name}</th><td>${entry.connected}</td><td><button onclick="kick(${index});">Kick</button></td></tr>`);
						}
						++index;
					}
					roster.innerHTML = list.join('');
					displayMessage('roster refreshed');
				} catch (e) {
					displayMessage(e.message);
				}
			}

			async function kick(slot) {
				let playerKicked = false;
				try {
					const input = getInput();
					// kick a user
					const kickJson = {
						'pass': input.password,
						'slot': slot
					};
					const kickJsonStr = JSON.stringify(kickJson);
					const response = await fetch(`${input.domain}kick`, {
						headers: {
							//'Authorization': 'Basic ' + btoa('admin:' + input.password),
							'Accept': 'application/json',
							'Content-Type': 'application/json'
						},
						method: 'PUT',
						body: kickJsonStr
					});
					const json = await response.json();
					if (json.code < 1) {
						displayMessage('failed to kick player');
						return;
					}
					playerKicked = true;
					displayMessage(`kicked player ${slot}`);
				} catch (e) {
					displayMessage(e.message);
				}
				if (playerKicked == true) {
					refreshRoster();
				}
			}

			async function launch() {
				const user = document.getElementById("user");
				const admin = document.getElementById("admin");		
				user.hidden = true;
				admin.hidden = true;
				resetZoom();
				let response;
				let gameLaunched = false;
				let config = null;
				try {
					const input = getInput();
					response = await fetch(`${input.domain}data`, {
						headers: { 'Accept': 'application/json' },
						method: 'GET'
					});
					config = await response.json();
					if (config.hasOwnProperty('code')) {
						user.hidden = false;
						admin.hidden = false;
						displayMessage('failed to get config');
						return;
					}
					// host the game
					const userJson = {
						'pass': input.password,
						'user': {
							name: input.name
						}
					};
					const userJsonStr = JSON.stringify(userJson);
					response = await fetch(`${input.domain}host`, {
						headers: {
							//'Authorization': 'Basic ' + btoa('admin:' + input.password),
							'Accept': 'application/json',
							'Content-Type': 'application/json'
						},
						method: 'PUT',
						body: userJsonStr
					});
					const json = await response.json();
					if (json.code < 1) {
						user.hidden = false;
						admin.hidden = false;
						displayMessage('failed to launch');
						return;
					}
					config.domain = json;
					config.domain.url = input.domain;	// hacky quick fix
					gameLaunched = true;
				} catch (e) {
					user.hidden = false;
					admin.hidden = false;
					displayMessage(e.message);
				}
				if (gameLaunched) {
					document.body.appendChild(window.tempStyle);
					window.gameObject = new Main();
					window.gameObject.init(config);
				}
			}

			async function join() {
				const user = document.getElementById("user");
				const admin = document.getElementById("admin");		
				const joinMode = admin.hidden;
				user.hidden = true;
				admin.hidden = true;
				resetZoom();
				let response;
				let gameLaunched = false;
				let config = null;
				try {
					const input = getInput();
					response = await fetch(`${input.domain}data`, {
						headers: { 'Accept': 'application/json' },
						method: 'GET'
					});
					config = await response.json();
					if (config.hasOwnProperty('code')) {
						user.hidden = false;
						admin.hidden = joinMode;
						displayMessage('failed to get config');
						return;
					}
					// join the game
					const userJson = {
						'user': {
							name: input.name
						}
					};
					const userJsonStr = JSON.stringify(userJson);
					response = await fetch(`${input.domain}join`, {
						headers: {
							//'Authorization': 'Basic ' + btoa('guest:join'),
							'Accept': 'application/json',
							'Content-Type': 'application/json'
						},
						method: 'PUT',
						body: userJsonStr
					});
					const json = await response.json();
					if (json.code < 1) {
						user.hidden = false;
						admin.hidden = joinMode;
						displayMessage('failed to join game');
						return;
					}
					config.domain = json;
					config.domain.url = input.domain;	// hacky quick fix
					gameLaunched = true;
				} catch (e) {
					user.hidden = false;
					admin.hidden = joinMode;
					displayMessage(e.message);
				}
				if (gameLaunched) {
					document.body.appendChild(window.tempStyle);
					window.gameObject = new Main();
					window.gameObject.init(config);
				}
			}

			function launchOffline() {
				const user = document.getElementById("user");
				const admin = document.getElementById("admin");		
				user.hidden = true;
				admin.hidden = true;
				document.body.appendChild(window.tempStyle);
				window.gameObject = new Main();
				window.gameObject.init({
					slot: 1,
					input: 1
				});
			}

			function getInput() {
				const name = document.getElementById("name");
				const password = document.getElementById("password");
				const domain = document.getElementById("domain");
				const settings_players = document.getElementById("settings_players");
				const settings_delay = document.getElementById("settings_delay");
				return {
					name: name.value,
					password: password.value,
					domain: domain.value,
					players: settings_players.value,
					delay: settings_delay.value
				};
			}

			function resetZoom() {
				//const viewport = document.querySelector('meta[name="viewport"]');
				//viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
			}

			function displayMessage(text) {
				const message = document.getElementById("message");
				++window.messageNum;
				message.innerHTML = `Message No. ${window.messageNum}: ${text}`;
			}

			function getLink() {
				console.log(window.location);
				const input = getInput();
				const joinLink = document.getElementById("join-link");
				const split = window.location.href.split('?');
				const encoded = input.domain
					.replaceAll(':', '%3A')
					.replaceAll('/', '%2F')
					.replaceAll('-', '%2D')
					.replaceAll('.', '%2E')
				;
				joinLink.innerHTML = `${split[0]}?u=${encoded}`;
			}

		</script>
	</body>
</html>
